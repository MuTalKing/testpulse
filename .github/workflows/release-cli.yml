name: Release CLI

# On a version tag (e.g. `git tag v0.0.2 && git push --tags`), builds the CLI distribution and
# attaches it to the GitHub Release, so people can download the `testpulse` command without Gradle.

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the release and upload assets
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Build CLI distribution
        run: ./gradlew :testpulse-cli:distZip

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: testpulse-cli/build/distributions/*.zip
          generate_release_notes: true   # auto changelog from commits/PRs
