name: testpulse

# Minimal TestPulse backend: metrics store + dashboards.
# Point the library at it with:  TESTPULSE_OUTPUT=push  TESTPULSE_ENDPOINT=http://localhost:8428
#
# The run-details plane (Postgres + object storage + report UI) arrives with the CLI uploader.

services:
  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.147.0
    container_name: testpulse-vm
    ports:
      - "8428:8428"           # HTTP API + Influx line-protocol ingestion at /write
    volumes:
      - vmdata:/victoria-metrics-data
    command:
      - "-storageDataPath=/victoria-metrics-data"
      - "-retentionPeriod=12"  # months
      - "-httpListenAddr=:8428"
    restart: unless-stopped

  postgres:
    image: postgres:17
    container_name: testpulse-pg
    environment:
      - POSTGRES_DB=testpulse
      - POSTGRES_USER=testpulse
      - POSTGRES_PASSWORD=testpulse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: testpulse-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=testpulse
      - MINIO_ROOT_PASSWORD=testpulse
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - miniodata:/data
    restart: unless-stopped

  testpulse-server:
    # Pull the published image (docker compose pull), or build from source (docker compose up --build).
    image: ghcr.io/mutalking/testpulse-server:${TESTPULSE_SERVER_TAG:-latest}
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: testpulse-server
    environment:
      - TESTPULSE_DB_URL=jdbc:postgresql://postgres:5432/testpulse
      - TESTPULSE_DB_USER=testpulse
      - TESTPULSE_DB_PASSWORD=testpulse
      - TESTPULSE_S3_ENDPOINT=http://minio:9000
      - TESTPULSE_S3_ACCESS_KEY=testpulse
      - TESTPULSE_S3_SECRET_KEY=testpulse
      - TESTPULSE_S3_BUCKET=testpulse
      # Host URL — the browser (not the container) follows the metrics link.
      - TESTPULSE_GRAFANA_URL=http://localhost:3000
      - PORT=8080
    ports:
      - "8088:8080"
    depends_on:
      - postgres
      - minio
    restart: unless-stopped

  grafana:
    image: grafana/grafana:13.0.3
    container_name: testpulse-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_DEFAULT_THEME=light
    volumes:
      # Datasource + dashboards are provisioned from files, so Grafana is stateless here.
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - victoriametrics
    restart: unless-stopped

volumes:
  vmdata:
  pgdata:
  miniodata:
